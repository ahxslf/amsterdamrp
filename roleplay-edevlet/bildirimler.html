<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bildirimler - Amsterdam RP e-Devlet</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="notifications">

<div class="top-bar">
  <div class="top-bar-inner">
    <div><i class="fas fa-flag" style="margin-right:6px;"></i> Amsterdam RP e-Devlet Kapısı</div>
    <div><a href="index.html">Ana Sayfa</a><a href="#" onclick="Theme.toggle();return false;">Tema</a></div>
  </div>
</div>

<header class="main-header">
  <div class="header-inner">
    <a href="index.html" class="logo"><div class="logo-icon">e-</div><div class="logo-text"><h1>Devlet Kapısı</h1><span>AMSTERDAM RP</span></div></a>
    <div class="header-actions" id="header-auth"></div>
  </div>
</header>

<div class="container" style="padding-top:30px;max-width:900px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:48px;height:48px;border-radius:12px;background:var(--light-blue);color:var(--primary-blue);display:grid;place-items:center;font-size:1.3rem;"><i class="fas fa-bell"></i></div>
      <div><h2 style="font-size:1.3rem;">Bildirimler</h2><p style="font-size:0.82rem;color:var(--text-muted);">Tüm bildirimleriniz</p></div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="markAllNotifs()"><i class="fas fa-check-double"></i> Tümünü Okundu İşaretle</button>
  </div>

  <div id="notif-full-list"></div>
</div>

<footer class="main-footer">
  <div class="footer-bottom" style="border:none;padding:16px 20px;margin:0 auto;max-width:1200px;">
    <div style="font-size:0.78rem;color:var(--text-muted);">© 2026, Amsterdam RP</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/services.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Theme.init();
  initSupabase();
  updateHeaderAuth();
  renderNotifPage();
});

function renderNotifPage() {
  const user = Auth.getUser();
  const el = document.getElementById('notif-full-list');
  if (!user || !el) { if(el) el.innerHTML='<div class="card" style="text-align:center;padding:40px;"><p>Bildirimleri görmek için giriş yapmalısınız.</p><a href="giris.html" class="btn btn-primary" style="margin-top:12px;">Giriş Yap</a></div>'; return; }

  const notifs = DB.getNotifications(user.tc);
  if (notifs.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🔔</div><h4>Bildirim yok</h4><p>Henüz bildiriminiz bulunmuyor.</p></div>';
    return;
  }

  el.innerHTML = notifs.map(n => `
    <div class="card" style="border-left:4px solid ${n.type==='success'?'#10b981':n.type==='error'?'#ef4444':n.type==='warning'?'#f59e0b':'var(--primary-blue)'};opacity:${n.read?'0.7':'1'};">
      <div style="display:flex;align-items:flex-start;gap:14px;">
        <div style="width:42px;height:42px;border-radius:50%;background:${n.type==='success'?'#d1fae5':n.type==='error'?'#fee2e2':n.type==='warning'?'#fef3c7':'#dbeafe'};color:${n.type==='success'?'#065f46':n.type==='error'?'#991b1b':n.type==='warning'?'#92400e':'#1e40af'};display:grid;place-items:center;font-size:1.1rem;flex-shrink:0;">
          <i class="${n.icon || 'fas fa-info-circle'}"></i>
        </div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <div style="font-weight:700;font-size:0.95rem;">${n.title} ${!n.read ? '<span class="status-badge status-acik" style="font-size:0.65rem;padding:2px 8px;">YENİ</span>' : ''}</div>
            <div style="font-size:0.78rem;color:var(--text-muted);">${formatDate(n.date)}</div>
          </div>
          <div style="font-size:0.88rem;color:var(--text-muted);line-height:1.5;">${n.body}</div>
          ${!n.read ? `<button class="btn btn-sm btn-outline" style="margin-top:8px;font-size:0.75rem;" onclick="markNotifAndRefresh(${n.id})"><i class="fas fa-check"></i> Okundu</button>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function markNotifAndRefresh(id) { DB.markNotifRead(id); renderNotifPage(); NotifBell.inject(); }
function markAllNotifs() { const u=Auth.getUser(); if(u){DB.markAllRead(u.tc);renderNotifPage();NotifBell.inject();Toast.success('Tüm bildirimler okundu.');} }
</script>
</body>
</html>
