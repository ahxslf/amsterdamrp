<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trafik Cezalarım - Amsterdam RP e-Devlet</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="traffic">

<div class="top-bar">
  <div class="top-bar-inner">
    <div><i class="fas fa-flag" style="margin-right:6px;"></i> Amsterdam RP e-Devlet Kapısı</div>
    <div><a href="index.html">Ana Sayfa</a><a href="#" onclick="Theme.toggle();return false;">Tema</a></div>
  </div>
</div>

<header class="main-header">
  <div class="header-inner">
    <a href="index.html" class="logo"><div class="logo-icon">e-</div><div class="logo-text"><h1>Devlet Kapısı</h1><span>AMSTERDAM RP</span></div></a>
    <div class="header-actions" id="header-auth"></div>
  </div>
</header>

<div class="container" style="padding-top:30px;max-width:1100px;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
    <div style="width:48px;height:48px;border-radius:12px;background:var(--light-blue);color:var(--primary-blue);display:grid;place-items:center;font-size:1.3rem;"><i class="fas fa-file-invoice-dollar"></i></div>
    <div>
      <h2 style="font-size:1.3rem;">Trafik Cezalarım</h2>
      <p style="font-size:0.82rem;color:var(--text-muted);">Tebliğ edilmiş trafik cezalarınızı görüntüleyin ve ödeyin.</p>
    </div>
  </div>

  <!-- Arama formu: sadece yetkili roller görür -->
  <div class="card" style="background:linear-gradient(135deg, rgba(21,101,192,0.04), rgba(21,101,192,0.01));">
    <form id="fine-form" style="display:grid;grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:14px;align-items:end;">
      <div class="form-group" style="margin:0;">
        <label><i class="fas fa-car" style="color:var(--text-muted);margin-right:4px;"></i> Plaka ile Ara</label>
        <input type="text" id="fine-plate" placeholder="örn: NL-RP-2024" style="text-transform:uppercase;">
      </div>
      <!-- TC input: JS tarafında gizlenecek vatandaş için -->
      <div class="form-group" style="margin:0;display:none;">
        <input type="hidden" id="fine-tc">
      </div>
      <div class="form-group" style="margin:0;">
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;height:46px;"><i class="fas fa-search"></i> Sorgula</button>
      </div>
    </form>
  </div>

  <div id="fine-stats" style="margin-top:18px;"></div>
  <div id="fine-results" style="margin-top:14px;"></div>
</div>

<footer class="main-footer">
  <div class="footer-bottom" style="border:none;padding:16px 20px;margin:0 auto;max-width:1200px;">
    <div style="font-size:0.78rem;color:var(--text-muted);">© 2026, Amsterdam RP</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=45"></script>
<script src="js/db.js?v=45"></script>
<script src="js/ui.js?v=45"></script>
<script src="js/auth.js?v=45"></script>
<script src="js/services.js?v=45"></script>
<script src="js/rp-extensions.js?v=45"></script>
<script src="js/police.js?v=45"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Theme.init();
  initSupabase();
  updateHeaderAuth();
  initTrafficPage();
});
</script>
</body>
</html>
