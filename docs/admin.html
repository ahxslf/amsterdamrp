<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Paneli - Amsterdam RP</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="admin">

<div class="top-bar" style="background:linear-gradient(90deg,#4c1d95,#7c3aed);">
  <div class="top-bar-inner">
    <div><i class="fas fa-crown" style="margin-right:6px;"></i> Amsterdam RP — Yönetim Paneli</div>
    <div><a href="index.html">Vatandaş Portalı</a><a href="#" onclick="Theme.toggle();return false;">Tema</a></div>
  </div>
</div>

<header class="main-header">
  <div class="header-inner">
    <a href="admin.html" class="logo"><div class="logo-icon" style="background:#7c3aed;"><i class="fas fa-crown"></i></div><div class="logo-text"><h1>Admin Paneli</h1><span>AMSTERDAM RP YÖNETİM</span></div></a>
    <div class="header-actions" id="header-auth"></div>
  </div>
</header>

<div class="container" style="padding-top:30px;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
    <div style="width:48px;height:48px;border-radius:12px;background:#7c3aed;color:#fff;display:grid;place-items:center;font-size:1.3rem;"><i class="fas fa-cogs"></i></div>
    <div><h2 style="font-size:1.3rem;">Yönetim Paneli</h2><p style="font-size:0.82rem;color:var(--text-muted);">Ceza onayları, e-İmza başvuruları, kullanıcı yönetimi</p></div>
  </div>

  <div id="admin-overview" style="margin-bottom:20px;"></div>
  <div id="admin-pending-fines" style="margin-bottom:20px;"></div>
  <div id="admin-esign-apps" style="margin-bottom:20px;"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;">
    <div id="admin-users"></div>
    <div id="admin-system"></div>
  </div>
</div>

<footer class="main-footer">
  <div class="footer-bottom" style="border:none;padding:16px 20px;margin:0 auto;max-width:1200px;">
    <div style="font-size:0.78rem;color:var(--text-muted);">© 2026, Amsterdam RP Admin Panel</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=43"></script>
<script src="js/db.js?v=43"></script>
<script src="js/ui.js?v=43"></script>
<script src="js/auth.js?v=43"></script>
<script src="js/services.js?v=43"></script>
<script src="js/admin.js?v=43"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  Theme.init();
  initSupabase();
  updateHeaderAuth();
  initAdminPage();
});
</script>
</body>
</html>
