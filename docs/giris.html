<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş - Amsterdam RP e-Devlet</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <div><i class="fas fa-flag" style="margin-right:6px;"></i> Amsterdam RP e-Devlet Kapısı</div>
    <div><a href="index.html">Ana Sayfa</a></div>
  </div>
</div>

<header class="main-header">
  <div class="header-inner">
    <a href="index.html" class="logo"><div class="logo-icon">e-</div><div class="logo-text"><h1>Devlet Kapısı</h1><span>AMSTERDAM RP</span></div></a>
    <div class="header-actions" id="header-auth"></div>
  </div>
</header>

<div style="display:grid;place-items:center;min-height:60vh;padding:40px 20px;">
  <div style="max-width:440px;width:100%;text-align:center;">
    <div class="card" style="padding:40px 30px;">
      <div class="logo-icon" style="width:72px;height:72px;font-size:28px;margin:0 auto 16px;background:var(--primary-red);">e-</div>
      <h2 style="font-size:1.4rem;margin-bottom:4px;">Amsterdam RP</h2>
      <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:28px;">e-Devlet Kapısı Kimlik Doğrulama</p>

      <button onclick="RPAuth.login()" class="btn" style="width:100%;justify-content:center;gap:12px;background:#5865F2;color:#fff;border:none;padding:16px 24px;font-size:1.05rem;border-radius:12px;">
        <i class="fab fa-discord" style="font-size:1.3rem;"></i> Discord ile Giriş Yap
      </button>

      <p style="font-size:0.78rem;color:var(--text-muted);margin-top:16px;line-height:1.5;">
        Amsterdam RP Discord sunucusuna üye olmanız gerekmektedir.<br>
        İlk girişte karakter oluşturmanız istenecektir.
      </p>

      <div style="margin-top:20px;padding:14px;background:rgba(88,101,242,0.06);border-radius:8px;font-size:0.82rem;color:var(--text-muted);">
        <i class="fas fa-shield-halved" style="color:#5865F2;margin-right:4px;"></i>
        Giriş bilgileriniz Discord OAuth2 ile güvenli şekilde doğrulanır.
      </div>
    </div>
  </div>
</div>

<script src="js/config.js?v=44"></script>
<script>
  // Minimal init — no Supabase needed for login page
  const Toast = { show(m,t,d=3200){ const c=document.querySelector('.toast-container')||Object.assign(document.createElement('div'),{className:'toast-container'}); if(!c.parentNode)document.body.appendChild(c); const e=document.createElement('div');e.className='toast '+(t||'info');e.innerHTML='<span>'+m+'</span>';c.appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),300);},d); }, success(m){this.show(m,'success');}, error(m){this.show(m,'error');}, info(m){this.show(m,'info');}, warning(m){this.show(m,'warning');} };
  function showLoading(){}
  function hideLoading(){}
</script>
<script src="js/auth.js?v=44"></script>
</body>
</html>
