<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Kontrolü - Amsterdam RP</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div style="display:grid;place-items:center;min-height:100vh;background:var(--bg-body);">
  <div style="text-align:center;padding:40px;max-width:500px;">
    <div id="status-icon" style="width:80px;height:80px;border-radius:50%;background:#5865F2;color:#fff;display:grid;place-items:center;font-size:2rem;margin:0 auto 20px;">
      <i class="fas fa-cog fa-spin"></i>
    </div>
    <h2 id="cb-title">Sistem Kontrol Ediliyor...</h2>
    <p id="cb-text" style="color:var(--text-muted);margin:12px 0 20px;">Lütfen bekleyiniz.</p>
    <div id="cb-loader" style="width:48px;height:48px;border:4px solid var(--border);border-top-color:#5865F2;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto;"></div>
    <div id="cb-error" style="display:none;margin-top:20px;">
      <p id="error-msg" style="color:var(--primary-red);margin-bottom:15px;font-size:0.9rem;font-weight:bold;"></p>
      <a href="giris.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Giriş Sayfasına Dön</a>
    </div>
  </div>
</div>

<!-- Cache-Busting: Dosyaların güncellendiğinden emin olmak için sonuna versiyon ekledik -->
<script src="js/config.js?v=1.1"></script>
<script src="js/db.js?v=1.1"></script>
<script src="js/ui.js?v=1.1"></script>
<script src="js/auth.js?v=1.1"></script>

<script>
if (typeof showLoading === 'undefined') window.showLoading = (msg) => { document.getElementById('cb-text').textContent = msg; };
if (typeof hideLoading === 'undefined') window.hideLoading = () => { document.getElementById('cb-loader').style.display = 'none'; };

document.addEventListener('DOMContentLoaded', async () => {
  try {
    // --- ADIM 1: DOSYA KONTROLLERİ ---
    console.log('Kontroller başlıyor...');
    
    if (typeof APP_CONFIG === 'undefined') throw new Error('Kritik Hata: config.js yüklenemedi!');
    if (typeof window.DB === 'undefined') throw new Error('Kritik Hata: db.js yüklenemedi veya DB objesi oluşturulamadı!');
    if (typeof Auth === 'undefined') throw new Error('Kritik Hata: auth.js yüklenemedi!');

    // --- ADIM 2: SUPABASE BAŞLATMA ---
    if (typeof initSupabase === 'function') {
      initSupabase();
    } else {
      throw new Error('Kritik Hata: initSupabase fonksiyonu db.js içinde bulunamadı!');
    }

    // --- ADIM 3: GİRİŞ İŞLEMİ ---
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');

    if (!accessToken) {
      throw new Error('Erişim jetonu (access_token) bulunamadı. Lütfen tekrar giriş yapın.');
    }

    await Auth.handleCallback(accessToken);

  } catch (err) {
    console.error('Sistem Hatası:', err);
    document.getElementById('status-icon').style.background = 'var(--primary-red)';
    document.getElementById('status-icon').innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
    document.getElementById('cb-title').textContent = 'Sistem Hatası!';
    document.getElementById('cb-loader').style.display = 'none';
    document.getElementById('cb-error').style.display = 'block';
    document.getElementById('error-msg').textContent = err.message;
  }
});
</script>
</body>
</html>
