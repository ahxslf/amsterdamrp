<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Doğrulanıyor... - Amsterdam RP</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div style="display:grid;place-items:center;min-height:100vh;text-align:center;">
  <h2 id="cb-title">Doğrulanıyor...</h2>
  <p id="cb-text">Lütfen bekleyiniz.</p>
  <div id="cb-error" style="display:none;color:red;font-weight:bold;margin-top:20px;"></div>
  <div id="cb-loader" style="width:40px;height:40px;border:4px solid #eee;border-top-color:#5865F2;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto;"></div>
</div>

<!-- ?v=2 ekleyerek önbelleği (cache) zorla temizliyoruz -->
<script src="js/config.js?v=3"></script>
<script src="js/db.js?v=3"></script>
<script src="js/ui.js?v=3"></script>
<script src="js/auth.js?v=3"></script>

<script>
window.showLoading = (m) => { document.getElementById('cb-text').textContent = m; };
document.addEventListener('DOMContentLoaded', async () => {
  try {
    if (typeof initSupabase === 'function') initSupabase();
    const accessToken = new URLSearchParams(window.location.hash.substring(1)).get('access_token');
    if (!accessToken) throw new Error('Token bulunamadı!');
    await Auth.handleCallback(accessToken);
  } catch (err) {
    document.getElementById('cb-loader').style.display = 'none';
    document.getElementById('cb-error').style.display = 'block';
    document.getElementById('cb-error').textContent = 'Hata: ' + err.message;
    console.error('TAM HATA:', err); // ← eklenen satır
  }
});
</script>
</body>
</html>
